<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, ScatterChart, Scatter, Cell,
} = Recharts;

// ── Read embedded data ───────────────────────────────────────────
const SITE_CONFIG = JSON.parse(document.getElementById('site-config').textContent);
const FALLBACK_DATA = JSON.parse(document.getElementById('cipher-data').textContent);

// Resolve data source synchronously:
// 1) data.js (loaded via <script> tag — works in file:// too)
// 2) embedded fallback inside this HTML
function resolveCipherData() {
  if (typeof window.CIPHER_DATA !== 'undefined'
      && window.CIPHER_DATA
      && Array.isArray(window.CIPHER_DATA.ciphers)) {
    return { data: window.CIPHER_DATA, source: 'data.js' };
  }
  console.warn('data.js not loaded — using embedded fallback');
  return { data: FALLBACK_DATA, source: 'embedded fallback' };
}

// ── Detect edit mode ────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const IS_EDIT = urlParams.get('edit') === '1';

// ── Value parsing helpers ────────────────────────────────────────
const parseValue = (str) => {
  if (str === null || str === undefined) return null;
  const s = String(str).trim();
  if (!s) return null;
  let m = s.match(/^2\s*(?:\^|\*\*)\s*(-?\d+(?:\.\d+)?)$/);
  if (m) return Math.pow(2, parseFloat(m[1]));
  m = s.match(/^(-?\d+(?:\.\d+)?)\s*[\*x·]\s*2\s*(?:\^|\*\*)\s*(-?\d+(?:\.\d+)?)$/);
  if (m) return parseFloat(m[1]) * Math.pow(2, parseFloat(m[2]));
  const n = parseFloat(s.replace(/,/g, ''));
  return isFinite(n) ? n : null;
};
const formatValue = (n) => {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  if (n === 0) return '0';
  // Beyond JS safe-integer range (≈9 × 10^15), comma display becomes meaningless
  // (trailing digits are zeros from float precision loss). Fall back to power-of-2.
  if (Math.abs(n) > Number.MAX_SAFE_INTEGER) {
    return `2^${Math.log2(Math.abs(n)).toFixed(2)}`;
  }
  return Math.round(n).toLocaleString();
};
const formatLog2 = (n) => (!n || !isFinite(n) || n <= 0) ? null : Math.log2(n);
const formatPlain = (n) => {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  if (n === 0) return '0';
  return Math.round(n).toLocaleString();
};
const formatAbbrev = (n) => {
  if (!isFinite(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1e15) return n.toExponential(1).replace('+', '');  // 1.0e15, 2.0e24, ...
  if (a >= 1e12) return (n / 1e12).toFixed(1) + 'T';   // tera
  if (a >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
  if (a >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
  if (a >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toString();
};

// ═══════════════════════════════════════════════════════════════
// PHYSICAL-COST MODELS
//
// Two error-correction codes are supported, selected via `physicalCode` UI:
//
//   • QLDPC (GB code)  — Webster et al., arXiv:2602.11457
//     Shor-targeted variants only (Prime ECC, Binary ECC).
//     Inputs: logical qubits, T-gates, measurement gates.
//
//   • Surface code     — ePrint 2026/106 §5.2 + arXiv:1603.09383 §7
//     Applies to BOTH Grover and Shor variants.
//     Inputs: logical qubits, T-gates, Clifford gates, T-depth.
//
// Common return shape: { physicalQubits, runtime, ...diagnostics, source }
// or null if the variant lacks the required inputs.
// ═══════════════════════════════════════════════════════════════

// ── QLDPC physical-cost (Eq. 22, expected runtime = oneShot / p_S) ─────
function computeQldpcPhysical(variant, tc, hw) {
  if (variant?.attack !== 'Shor') return null;
  if (!hw) return null;

  const ov = variant?.qldpcInputs;
  const overrideReady =
    ov && String(ov.qubits ?? '').trim() !== ''
       && String(ov.tGates ?? '').trim() !== ''
       && String(ov.measurementGates ?? '').trim() !== '';
  const src = overrideReady ? ov : variant?.logical;
  const source = overrideReady ? 'qldpc' : 'logical';

  const q  = parseValue(src?.qubits);
  const tg = parseValue(src?.tGates);
  const rawMg = src?.measurementGates;
  if (rawMg === undefined || rawMg === null || String(rawMg).trim() === '') return null;
  const mg = parseValue(rawMg);
  if (mg === null || !isFinite(mg)) return null;
  if (!q || q <= 0 || !tg || tg <= 0) return null;

  const { k, n_pb, n_me, d_t, p_r, p_L, p_T } = hw;
  const corrected = tg / (1 - p_r) + q + mg;
  const physicalQubits = n_pb * Math.ceil(q / k) + n_me;
  const oneShot = corrected * d_t * tc;
  const logPs = q * corrected * Math.log1p(-p_L) + tg * Math.log1p(-p_T);
  const pS = Math.exp(logPs);
  const runtime = pS > 0 ? oneShot / pS : Infinity;

  return { physicalQubits, runtime, oneShot, pS, source };
}

// ── Surface code physical-cost ─────────────────────────────────
//
// Iteratively determines distillation code distances given an output infidelity
// target (p_out = 1 / t_count) and a physical error rate p_in.
function estimateCodeDistances(p_out, p_in, epsilon = 1.0) {
  const p_g = p_in / 10.0;
  const d_list = [];
  let p = p_out;
  let outerSafety = 0;
  while (outerSafety++ < 300) {
    const target_rhs = (epsilon * p) / (1 + epsilon);
    let d_i = 1;
    let innerSafety = 0;
    while (innerSafety++ < 1000) {
      const lhs = 192 * d_i * Math.pow(100 * p_g, (d_i + 1) / 2);
      if (lhs < target_rhs) break;
      d_i += 1;
    }
    d_list.push(d_i);
    p = Math.pow(p / (35 * (1 + epsilon)), 1 / 3);
    if (p > p_in) break;
  }
  return d_list;
}

function computeSurfacePhysical(variant, tc, p_in) {
  // Surface code applies to BOTH Grover and Shor variants. Uses variant.logical
  // values exclusively (no override block); requires qubits, tGates, clifford, tDepth.
  const L = variant?.logical;
  if (!L) return null;
  const t_count = parseValue(L.tGates);
  const q_count = parseValue(L.qubits);
  const c_count = parseValue(L.clifford);
  const t_depth = parseValue(L.tDepth);
  if (!t_count || t_count <= 0) return null;
  if (!q_count || q_count <= 0) return null;
  if (!c_count || c_count <= 0) return null;
  if (!t_depth || t_depth <= 0) return null;

  const p_out = 1.0 / t_count;
  const distances = estimateCodeDistances(p_out, p_in);
  const Lcount = distances.length;
  if (Lcount === 0) return null;

  // Build distillation-tower layers (i=1 ↔ innermost, i=Lcount ↔ outermost)
  const layers = [];
  for (let i = 1; i <= Lcount; i++) {
    const d_i = distances[Lcount - i];
    const n_dist_i = 16 * Math.pow(15, Lcount - i);
    const total_i = (2.5 * 1.25 * d_i * d_i) * n_dist_i;
    const cycle_i = 10 * d_i;
    layers.push({ d: d_i, n_dist: n_dist_i, total_qubits: total_i, cycles: cycle_i });
  }

  const surface_cycle = layers.reduce((s, li) => s + li.cycles, 0);
  let pipeline = 1;
  if (Lcount >= 2) {
    pipeline = Math.max(Math.floor(layers[0].total_qubits / layers[1].total_qubits), 1);
  }

  const T_c_d = Math.ceil(t_count / t_depth);
  const Factory = Math.ceil(T_c_d / pipeline);
  const T_phys = layers[0].total_qubits * Factory;

  // Clifford-region distance d_cliff
  const threshold = 1.0 / c_count;
  let d_cliff = 1;
  let cliffSafety = 0;
  while (cliffSafety++ < 1000) {
    if (Math.pow(p_in / 0.0125, (d_cliff + 1) / 2) < threshold) break;
    d_cliff += 1;
  }
  const C_phys = q_count * 2.5 * 1.25 * d_cliff * d_cliff;

  const physicalQubits = C_phys + T_phys;
  const magic_gen_time = tc * surface_cycle;
  const runtime = (t_count / pipeline) * magic_gen_time / Factory;

  return { physicalQubits, runtime, L: Lcount, distances, d_cliff, source: 'logical' };
}

// ── Dispatcher ────────────────────────────────────────────────
function computePhysical(variant, tc, hw, code) {
  if (code === 'surface') return computeSurfacePhysical(variant, tc, hw?.p);
  return computeQldpcPhysical(variant, tc, hw);
}

// Human-readable runtime — escalates: s → min → h → days → months → years
//   thresholds: 60s | 60min | 24h | 30d | 12m
function formatRuntime(seconds) {
  if (seconds === null || seconds === undefined || !isFinite(seconds)) return '—';
  if (seconds <= 0) return '—';
  const MIN = 60;
  const HR = 60 * MIN;          // 3,600 s
  const DAY = 24 * HR;          // 86,400 s
  const MONTH = 30 * DAY;       // 2,592,000 s  (≈30 days/month)
  const YEAR = 365 * DAY;       // 31,536,000 s — matches Python summary convention
  let value, unit;
  if      (seconds < MIN)    { value = seconds;        unit = 's'; }
  else if (seconds < HR)     { value = seconds / MIN;  unit = 'min'; }
  else if (seconds < DAY)    { value = seconds / HR;   unit = 'h'; }
  else if (seconds < MONTH)  { value = seconds / DAY;  unit = 'days'; }
  else if (seconds < YEAR)   { value = seconds / MONTH; unit = 'months'; }
  else                       { value = seconds / YEAR;  unit = 'years'; }
  // For huge year counts, switch to scientific then 2^X
  if (unit === 'years' && value > 1e6) {
    if (value > Number.MAX_SAFE_INTEGER) {
      return `2^${Math.log2(value).toFixed(1)} years`;
    }
    return `${value.toExponential(2)} years`;
  }
  return `${value.toFixed(value >= 100 ? 0 : 2)} ${unit}`;
}

// We force colors via inline style + CSS variables so that the tooltip
// is always legible regardless of where Recharts mounts it in the DOM,
// and regardless of any Tailwind utility cascade.
// Visual style matches the scatter-chart tooltip: large coloured variant
// name → small grey cipher-family label → one row per metric.
const ChartTooltip = ({ active, payload, label, logScale }) => {
  if (!active || !payload?.length) return null;
  // First payload carries the row, which holds cipher (family) + color.
  const row = payload[0].payload || {};
  const variantColor = row.color || payload[0].color;
  const variantName  = label || row.name;
  const familyName   = row.cipher;
  return (
    <div
      className="rounded-lg border backdrop-blur-md px-4 py-3 shadow-2xl"
      style={{
        background:  'var(--tooltip-bg)',
        borderColor: 'var(--tooltip-border)',
        color:       'var(--tooltip-value)',
      }}>
      <div className="font-mono text-lg" style={{ color: variantColor }}>{variantName}</div>
      {familyName && familyName !== variantName && (
        <div className="font-mono text-xs mb-2" style={{ color: 'var(--tooltip-label)' }}>{familyName}</div>
      )}
      <div className="font-mono text-xs space-y-1 mt-1" style={{ color: 'var(--tooltip-name)' }}>
        {payload.map((p, i) => {
          const rawKey = `_raw_${p.dataKey}`;
          const raw = p.payload?.[rawKey];
          const isRuntime = p.dataKey === 'runtime';
          const display = (raw !== undefined && raw !== null)
            ? (isRuntime ? formatRuntime(raw) : formatValue(raw))
            : formatValue(p.value);
          return (
            <div key={i}>
              {p.name}: <span style={{ color: 'var(--tooltip-value)' }}>{display}</span>
              {isRuntime && raw !== undefined && raw !== null && raw >= 60 && (
                <span style={{ color: 'var(--tooltip-sub)' }}> ({formatValue(raw)} s)</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Custom X-axis tick that shows ONE label per cipher group ──
// Used when cipherFilter === 'all' to avoid 33 overlapping variant labels.
// Slight rotation (-25°) keeps adjacent single-variant groups from colliding.
const CipherGroupTick = ({ x, y, payload, chartData, ciphers }) => {
  const variant = chartData.find(d => d.name === payload.value);
  if (!variant) return null;
  const sameCipher = chartData.filter(d => d.cipher === variant.cipher);
  const idx = sameCipher.findIndex(d => d.name === variant.name);
  const mid = Math.floor((sameCipher.length - 1) / 2);
  if (idx !== mid) return null;     // only label the middle bar of each group
  const cipher = ciphers.find(c => c.name === variant.cipher);
  const color = cipher?.color || 'rgba(255,255,255,0.7)';
  // Steeper -45° rotation + textAnchor="end" prevents adjacent labels from
  // overlapping horizontally when many cipher families are shown in ALL mode.
  return (
    <g transform={`translate(${x}, ${y + 12})`}>
      <text
        x={0} y={0}
        textAnchor="end"
        transform="rotate(-45)"
        fill={color}
        style={{ fontFamily: 'JetBrains Mono', fontSize: 12, fontWeight: 500 }}>
        {variant.cipher}
      </text>
    </g>
  );
};

function GroverPage({ ciphers }) {
  // Group all ciphers attacked by some Grover variant
  const groverGroups = [
    { attack: 'Grover + Exhaustive key search', label: 'Symmetric ciphers',  desc: 'Key recovery by searching the keyspace.' },
    { attack: 'Grover + Preimage search',       label: 'Hash functions',     desc: 'Preimage / second-preimage search.' },
    { attack: 'Grover + ISD',                   label: 'Code-based PQC',     desc: 'Information-set decoding accelerated by Grover.' },
    { attack: 'Grover + NV sieve (SVP problem)', label: 'Lattice-based PQC', desc: 'Quantum lattice sieve attacking the SVP.' },
  ];
  const matched = groverGroups.map(g => ({
    ...g,
    list: ciphers.filter(c => c.variants.some(v => v.attack === g.attack)),
  })).filter(g => g.list.length > 0);

  return (
    <PageShell
      kicker="Quantum attack model"
      title="Grover's Algorithm"
      lead="Grover's algorithm searches an unstructured space of N candidates in O(√N) queries to a quantum oracle, providing a quadratic speed-up over the classical O(N) brute-force search. Against cryptographic primitives, it reduces the effective security level by half."
    >
      <Section heading="The Algorithm in Brief">
        <p>
          Given a function <em>f : {'{0,1}'}<sup>n</sup> → {'{0,1}'}</em> with a unique marked input <em>x*</em> (i.e. <em>f(x*) = 1</em>),
          Grover's algorithm finds <em>x*</em> with high probability using approximately ⌊π/4 · √N⌋ oracle calls,
          where <em>N = 2<sup>n</sup></em>.
        </p>
        <MathBlock>Queries ≈ (π/4) · 2<sup>n/2</sup>  ·  speed-up: quadratic vs. classical 2<sup>n</sup></MathBlock>
        <p>
          The algorithm alternates two unitary operations: an <span className="text-white">oracle</span> that flips the phase of the marked state,
          and a <span className="text-white">diffusion operator</span> that reflects amplitudes about their mean. After O(√N) iterations the
          amplitude on |x*⟩ approaches 1.
        </p>
      </Section>

      <Section heading="The Oracle for Symmetric-Key Attacks">
        <p>
          For block ciphers the oracle is built around a single known plaintext-ciphertext pair <em>(m, c)</em>.
          On a candidate key <em>|k⟩</em> it computes the encryption <em>Enc<sub>k</sub>(m)</em>, XORs the result against the target ciphertext <em>c</em>
          into a phase ancilla initialised to <em>|−⟩</em>, then uncomputes the encryption with <em>Enc<sup>†</sup></em>.
          The diagram below shows this oracle in its standard reversible form — the dashed box is one full Grover iteration's <em>U<sub>f</sub></em>.
        </p>
        <Figure
          src="assets/Grover_Oracle.png"
          alt="Quantum circuit for a Grover oracle U_f on a block cipher: Enc on (k,m), CNOT into a phase-kickback ancilla, then Enc-dagger."
          caption="Grover oracle for symmetric-key search. The encryption Enc and its inverse Enc† act on the key register |k⟩ and message register |m⟩; the marked condition Enc_k(m) = c is reflected into the phase ancilla |−⟩ via a controlled-NOT. The cost reported in the Resource Estimator (T-gates, T-depth, Clifford count) is dominated by Enc / Enc†."
        />
      </Section>

      <Section heading="Security Impact">
        <p>
          For an n-bit key, classical exhaustive search costs <em>2<sup>n</sup></em> evaluations. Grover reduces this to <em>2<sup>n/2</sup></em>:
          an AES-128 key, classically 2<sup>128</sup>-secure, faces a quantum attack cost of 2<sup>64</sup> oracle calls.
          To compensate, NIST recommends doubling the symmetric key size for post-quantum security
          (AES-256 retains ≈ 2<sup>128</sup> quantum security).
        </p>
        <p className="text-white/55">
          The 2<sup>n/2</sup> count is an oracle-call bound, not a time estimate. Each oracle invocation requires
          coherent evaluation of the cipher's full encryption circuit — the cost reflected in the "Logical Resources"
          and "Physical Resources" tabs of the Resource Estimator.
        </p>
      </Section>

      <Section heading="Targets in This Catalogue">
        <p className="text-white/60">
          The following cipher families are analyzed under Grover-style attacks. Each variant has its own logical-resource
          estimate (qubits, T-gates, T-depth, Clifford gates) captured in the Resource Estimator.
        </p>
        {matched.map(g => (
          <div key={g.attack} className="rounded-lg border border-white/10 bg-white/[0.02] p-4">
            <div className="flex items-baseline justify-between mb-1.5 flex-wrap gap-2">
              <div className="font-mono text-sm text-white">{g.label}</div>
              <div className="font-mono text-[10px] text-white/40">{g.attack}</div>
            </div>
            <div className="font-mono text-xs text-white/55 mb-3">{g.desc}</div>
            <div className="flex flex-wrap gap-1.5">
              {g.list.map(c => <Pill key={c.id} color={c.color}>{c.name}</Pill>)}
            </div>
          </div>
        ))}
      </Section>

      <Section heading="What Changes per Primitive Type">
        <p>
          Symmetric ciphers (AES, ARIA, LEA, CHAM, …): the oracle evaluates the
          encryption circuit on a candidate key; Grover then amplifies the key matching the known plaintext-ciphertext pair.
        </p>
        <p>
          Hash functions (SHA-2, SHA-3, ASCON-HASH, …): the oracle marks inputs that hash to a target digest.
          A 256-bit hash offers 2<sup>128</sup> quantum preimage resistance.
        </p>
        <p>
          Code-based PQC (Classic McEliece, HQC, BIKE): Grover accelerates the
          inner search step of information-set decoding (ISD). Effective complexity is <em>2<sup>α·n/2</sup></em> for
          some constant α that depends on the ISD variant.
        </p>
        <p>
          Lattice-based PQC (Kyber, Dilithium, SMAUG-T, HAETAE): applies inside
          the Nguyen-Vidick (NV) lattice sieve to find the shortest vector. The sieve's classical inner-loop search of
          2<sup>0.292·d</sup> candidates per iteration becomes 2<sup>0.265·d</sup> under Grover.
        </p>
      </Section>
    </PageShell>
  );
}

function ShorPage({ ciphers }) {
  const shorCiphers = ciphers.filter(c => c.variants.some(v => v.attack === 'Shor'));

  return (
    <PageShell
      kicker="Quantum attack model"
      title="Shor's Algorithm"
      lead="Shor's algorithm solves the integer factorization and discrete-logarithm problems in polynomial time on a quantum computer — completely breaking RSA, Diffie-Hellman, and elliptic-curve cryptography. The attack model is fundamentally different from Grover: it uses quantum Fourier transforms to find the period of a modular function, not unstructured search."
    >
      <Section heading="The Algorithm in Brief">
        <p>
          The core problem is <em>period finding</em>: given a function <em>f(x) = a<sup>x</sup> mod N</em>, find the
          smallest <em>r {'>'} 0</em> such that <em>f(x+r) = f(x)</em>. Shor showed this period can be extracted from a
          quantum Fourier transform, and that factoring N (or computing discrete logarithms) reduces to period finding.
        </p>
        <MathBlock>Complexity: O((log N)<sup>3</sup>)  ·  classical best: sub-exponential (e.g. GNFS)</MathBlock>
        <p>
          Unlike Grover's quadratic speed-up, Shor's exponential speed-up means that increasing key size
          provides no escape. RSA-2048, ECC-256, and discrete-log instances are all polynomially attackable.
        </p>
      </Section>

      <Section heading="Two Flavours: Factoring and Discrete Log">
        <p>
          Integer factoring (RSA): given a composite <em>N = p·q</em>, factor it.
          Shor's algorithm reduces this to finding the multiplicative order of a random base mod N.
        </p>
        <p>
          Discrete logarithm (DH, ECC): given a group <em>G</em>, a generator
          <em>g</em>, and an element <em>h = g<sup>x</sup></em>, find <em>x</em>. The quantum subroutine is essentially the
          same — period finding of a function defined over the group.
        </p>
        <Figure
          src="assets/Shor.png"
          alt="Quantum circuit for Shor's algorithm on the elliptic-curve discrete logarithm problem: two H-prepared registers, controlled scalar additions [2^i]P and [2^i]Q on a point register, ending with two QFTs and measurement."
          caption="Shor's algorithm for the elliptic-curve discrete log (ECDLP). Two index registers |k⟩, |ℓ⟩ are Hadamard-prepared, each controlling a tower of scalar multiplications +[2^i]P and +[2^i]Q on the curve-point register |O⟩. The two QFTs reveal the period that encodes the discrete logarithm. The Resource Estimator's ECC entries (Prime ECC qubit/depth-opt, Binary ECC) report the logical cost of this circuit family."
        />
        <p className="text-white/60">
          For elliptic-curve cryptography, the group operation is scalar multiplication on an elliptic curve. The
          resource estimates in this catalogue reflect that ECC instances at security level k bits need on the order of
          <em>~ 2k</em> logical qubits and <em>O(k<sup>3</sup>)</em> Toffoli gates.
        </p>
      </Section>

      <Section heading="Targets in This Catalogue">
        <p className="text-white/60">
          All public-key primitives based on factoring or discrete-log fall to Shor. This catalogue includes:
        </p>
        <div className="space-y-2">
          {shorCiphers.map(c => (
            <div key={c.id} className="flex items-baseline justify-between gap-3 px-4 py-3 rounded-md border border-white/10 bg-white/[0.02]">
              <Pill color={c.color}>{c.name}</Pill>
              <div className="font-mono text-xs text-white/55">{c.variants.length} variants</div>
            </div>
          ))}
        </div>
        <p className="text-white/60 pt-2">
          The Resource Estimator's QLDPC physical-cost model is calibrated specifically for
          Shor-targeted variants — its parameters (block sizes, magic-engine width, code distances) come from the
          factoring-and-discrete-log analysis in Webster et al. (arXiv:2602.11457). The Surface-code model applies more
          broadly to both Grover and Shor variants.
        </p>
      </Section>

      <Section heading="Why Post-Quantum?">
        <p>
          Because Shor's polynomial-time speed-up cannot be patched by larger keys, the cryptographic community has
          standardized lattice-, code-, and hash-based replacements (Kyber, Dilithium, Classic McEliece, SPHINCS+).
          These rely on problems for which no polynomial-time quantum algorithm is known.
        </p>
        <p className="text-white/60">
          However, these new schemes are <em>not</em> immune to all quantum attacks — they remain subject to Grover-style
          generic attacks on their underlying search problems (ISD for code-based, lattice sieves for lattice-based),
          covered on the Grover page.
        </p>
      </Section>
    </PageShell>
  );
}

        <p className="text-white/60">

        </p>

// PHYSICAL ESTIMATION — Surface codes

      <Section heading="Surface Code in Brief">
        <p>

          hold the encoded logical information; measure qubits at plaquette centers
          continuously read X and Z stabilizers, producing an error syndrome from which errors are decoded. The{' '}
          <em>code distance d</em> is the minimum weight of a logical operator — larger <em>d</em> tolerates more
          errors at the cost of more physical qubits per logical qubit. The figure below shows the standard
          rotated layout at <em>d = 5</em>; the formulas the estimator actually uses are introduced in the
          sections that follow.
        </p>
        <InlineFigure caption="A rotated surface-code logical qubit at distance d = 5. Data qubits (yellow) sit at lattice vertices; measure qubits (blue) at bulk plaquette centers and at boundary half-stabilizers (the rounded bumps along each edge) read X and Z stabilizers.">
          <svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg"
               style={{ width: '100%', maxHeight: '270px' }}
               fontFamily="JetBrains Mono, monospace">

                    width="30" height="14" rx="7"

            {/* Bottom boundary X half-stabilizers — at cols 1, 3 */}
            {[1, 3].map(col => (

                    x={103 + col * 36} y={203}
                    width="30" height="14" rx="7"
                    fill="#3b82f6" fillOpacity="0.32" />
            ))}
            {/* Left boundary Z half-stabilizers — at rows 1, 3 */}
            {[1, 3].map(row => (
              <rect key={`l-${row}`}
                    x={86} y={63 + row * 36}
                    width="14" height="30" rx="7"
                    fill="#93c5fd" fillOpacity="0.2" />
            ))}
            {/* Right boundary Z half-stabilizers — at rows 0, 2 */}
            {[0, 2].map(row => (
              <rect key={`r-${row}`}
                    x={250} y={63 + row * 36}
                    width="14" height="30" rx="7"
                    fill="#93c5fd" fillOpacity="0.2" />

                        cx={100 + col * 36} cy={60 + row * 36} r="6.5"

            {Array.from({ length: 4 }).map((_, row) =>
              Array.from({ length: 4 }).map((_, col) => (
                <circle key={`mq-${row}-${col}`}
                        cx={118 + col * 36} cy={78 + row * 36} r="5.5"
                        fill="#60a5fa" fillOpacity="0.95"
                        stroke="#2563eb" strokeOpacity="0.7" strokeWidth="0.8" />

            )}

            {/* Boundary measure qubits — at the centers of the 8 half-stabilizers */}
            {[
              { cx: 118, cy: 54 }, { cx: 190, cy: 54 },   // top
              { cx: 154, cy: 210 }, { cx: 226, cy: 210 }, // bottom
              { cx: 93, cy: 114 }, { cx: 93, cy: 186 },   // left

            ].map((p, i) => (

                    fill="currentColor" fillOpacity="0.85">Code distance d = 5</text>

          </svg>
        </InlineFigure>
      </Section>

      <Section heading="What the Estimator Reads">
        <p>
          From each variant's <em>logical</em> block the estimator pulls four numbers:
          logical qubits <em>N<sub>log</sub></em>, T-gate count <em>T<sub>c</sub></em>,
          Clifford count <em>C<sub>g</sub></em>, and T-depth <em>T<sub>d</sub></em>.
          From the UI it takes a physical error rate <em>p</em> and a code cycle time <em>t<sub>c</sub></em>;
          the per-gate error is fixed at <em>p<sub>g</sub> = p/10</em>. If any of the four logical inputs
          is missing or zero, no surface-code estimate is produced.
        </p>
      </Section>

      <Section heading="Magic-State Distillation">
        <p>
          T-gates are produced by chained 15-to-1 Reed-Muller distillation. The estimator picks the
          number of layers and a code distance <em>d<sub>i</sub></em> at each layer so the output
          infidelity drops below <em>1 / T<sub>c</sub></em>. At each layer it solves
        </p>
        <MathBlock>
          192·d<sub>i</sub>·(100·p<sub>g</sub>)<sup>(d<sub>i</sub>+1)/2</sup>  &lt;  ε·p<sub>out,i</sub> / (1 + ε)
        </MathBlock>
        <p>
          for the smallest integer <em>d<sub>i</sub></em>, then propagates
          <em> p<sub>out,i+1</sub> = (p<sub>out,i</sub>/(35(1+ε)))<sup>1/3</sup></em> to the next layer.
          A logical qubit at distance <em>d</em> uses
        </p>
        <MathBlock>
          Q<sub>phys</sub>(d) = 2.5 × 1.25 × d²
        </MathBlock>
      </Section>

      <Section heading="Parallel Factories">
        <p>
          One distillation factory occupies the outermost layer's footprint and produces
          <em> N<sub>par</sub> = ⌊Q<sub>bot</sub> / Q<sub>top</sub>⌋</em> states per round
          (a round is <em>C<sub>dist</sub> = 10·Σ d<sub>i</sub></em> surface cycles). To keep up
          with the circuit's T-depth the estimator instantiates
        </p>
        <MathBlock>
          N<sub>fact</sub> = ⌈(T<sub>c</sub> / T<sub>d</sub>) / N<sub>par</sub>⌉
        </MathBlock>
        <p>
          factories in parallel. Their combined footprint is the T-region cost
          <em> Q<sub>T</sub> = Q<sub>bot</sub> · N<sub>fact</sub></em>.
        </p>
      </Section>

      <Section heading="Clifford Region">
        <p>
          Clifford gates live outside the distillation pipeline and run at their own code
          distance <em>d<sub>c</sub></em>, the smallest integer satisfying
        </p>
        <MathBlock>
          (p / 0.0125)<sup>(d<sub>c</sub>+1)/2</sup>  &lt;  1 / C<sub>g</sub>
        </MathBlock>
        <p>
          giving a footprint of <em>Q<sub>C</sub> = N<sub>log</sub> · Q<sub>phys</sub>(d<sub>c</sub>)</em>.
        </p>
      </Section>

      <Section heading="What It Returns">
        <InlineFigure caption="Schematic — areas are not drawn to scale; the actual Q_T / Q_C ratio varies widely by variant and can favor either contribution.">
          <svg viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg"
               style={{ width: '100%', maxHeight: '270px' }}
               fontFamily="JetBrains Mono, monospace">
            {/* T-region container */}
            <rect x="20" y="30" width="295" height="200" rx="8"
                  fill="#22d3ee" fillOpacity="0.04"
                  stroke="#22d3ee" strokeOpacity="0.55" strokeWidth="1" />
            <text x="38" y="56" fontSize="10" letterSpacing="2"
                  fill="#22d3ee" fillOpacity="0.95">T-REGION (Q_T)</text>

            {/* Factory grid 6x4 representing N_fact factories */}
            {Array.from({ length: 4 }).map((_, row) =>
              Array.from({ length: 6 }).map((_, col) => (
                <rect key={`f-${row}-${col}`}
                      x={38 + col * 42} y={75 + row * 28}
                      width="34" height="22" rx="2"
                      fill="#22d3ee" fillOpacity="0.12"
                      stroke="#22d3ee" strokeOpacity="0.55" strokeWidth="0.8" />
              ))
            )}

            <text x="38" y="218" fontSize="10.5" fill="currentColor" fillOpacity="0.7">
              N_fact factories · each Q_bot physical qubits
            </text>

            {/* Plus sign between regions */}
            <text x="332" y="146" fontSize="26" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.45">+</text>

            {/* Clifford region container — same width as T-region for visual balance */}
            <rect x="350" y="30" width="310" height="200" rx="8"
                  fill="currentColor" fillOpacity="0.02"
                  stroke="currentColor" strokeOpacity="0.35" strokeWidth="1" />
            <text x="368" y="56" fontSize="10" letterSpacing="2"
                  fill="currentColor" fillOpacity="0.8">CLIFFORD REGION (Q_C)</text>

            {/* N_log qubit dots — denser grid hints at "many small qubits" */}
            {Array.from({ length: 7 }).map((_, row) =>
              Array.from({ length: 14 }).map((_, col) => (
                <circle key={`dt-${row}-${col}`}
                        cx={380 + col * 19} cy={82 + row * 18} r="2.2"
                        fill="currentColor" fillOpacity="0.5" />
              ))
            )}

            <text x="368" y="218" fontSize="10.5" fill="currentColor" fillOpacity="0.7">
              N_log qubits at code distance d_c
            </text>

            {/* Total formula */}
            <text x="340" y="270" fontSize="13" textAnchor="middle"
                  fill="#22d3ee">Q_total = Q_T + Q_C</text>
          </svg>
        </InlineFigure>
        <p>
          Two numbers — surfaced in the main view as Physical Qubits
          and Runtime:
        </p>
        <MathBlock>
          Q<sub>total</sub> = Q<sub>T</sub> + Q<sub>C</sub>
        </MathBlock>
        <MathBlock>
          t<sub>total</sub> = (T<sub>c</sub> / (N<sub>par</sub>·N<sub>fact</sub>)) · C<sub>dist</sub> · t<sub>c</sub>
        </MathBlock>
        <p className="text-white/60">
          Clifford execution overlaps with distillation, so it does not stretch the wall clock.
          Lowering <em>t<sub>c</sub></em> shortens the runtime linearly without changing the qubit count.
        </p>
      </Section>
    </PageShell>
  );
}

                  fill="#22d3ee" fillOpacity="0.95">BLOCK 2</text>
            {Array.from({ length: 4 }).map((_, row) =>
              Array.from({ length: 4 }).map((_, col) => (
                <circle key={`b2-${row}-${col}`}
                        cx={173 + col * 18} cy={82 + row * 14} r="2"
                        fill="#22d3ee" fillOpacity="0.7" />
              ))
            )}
            <text x="210" y="150" fontSize="9" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.65">k logical · n_pb phys</text>

            {/* Ellipsis */}
            <text x="295" y="108" fontSize="20" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.45">···</text>

            {/* Block ⌈N/k⌉ */}
            <rect x="330" y="40" width="120" height="120" rx="6"
                  fill="#22d3ee" fillOpacity="0.05"
                  stroke="#22d3ee" strokeOpacity="0.55" strokeWidth="1" />
            <text x="390" y="62" fontSize="9" letterSpacing="2" textAnchor="middle"
                  fill="#22d3ee" fillOpacity="0.95">BLOCK ⌈N/k⌉</text>
            {Array.from({ length: 4 }).map((_, row) =>
              Array.from({ length: 4 }).map((_, col) => (
                <circle key={`bn-${row}-${col}`}
                        cx={353 + col * 18} cy={82 + row * 14} r="2"
                        fill="#22d3ee" fillOpacity="0.7" />
              ))
            )}
            <text x="390" y="150" fontSize="9" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.65">k logical · n_pb phys</text>

            {/* Connector to magic engine */}
            <line x1="450" y1="100" x2="490" y2="100"
                  stroke="currentColor" strokeOpacity="0.35" strokeDasharray="3 3" />

            {/* Magic engine */}
            <rect x="490" y="40" width="160" height="120" rx="6"
                  fill="currentColor" fillOpacity="0.025"
                  stroke="currentColor" strokeOpacity="0.4" strokeWidth="1" />
            <text x="570" y="62" fontSize="9" letterSpacing="2" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.8">MAGIC ENGINE</text>
            <text x="570" y="115" fontSize="20" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.75">|T⟩</text>
            <text x="570" y="150" fontSize="9" textAnchor="middle"
                  fill="currentColor" fillOpacity="0.65">n_me physical</text>

            {/* Formula below */}
            <text x="340" y="210" fontSize="13" textAnchor="middle"
                  fill="#22d3ee">Q_phys = n_pb · ⌈N / k⌉ + n_me</text>
          </svg>
        </InlineFigure>
        <p className="text-white/60">
          A space-time trade-off (multiple parallel units) is possible but not exposed in this UI —
          the baseline is one unit.
        </p>
      </Section>

      <Section heading="Cycles, Rejection, Runtime">
        <p>
          Each T-state injection and each logical measurement counts as one logical cycle. T-cycles
          can be rejected by the magic engine with probability <em>p<sub>r</sub></em>, so the estimator
          inflates the T workload:
        </p>
        <MathBlock>
          L<sub>corr</sub> = N<sub>T</sub> / (1 − p<sub>r</sub>) + N<sub>M</sub>
        </MathBlock>
        <p>
          The logical cycle time is <em>t<sub>ℓ</sub> = d<sub>t</sub>·t<sub>c</sub></em>, giving a
          one-shot runtime
        </p>
        <MathBlock>
          t<sub>shot</sub> = L<sub>corr</sub> · d<sub>t</sub> · t<sub>c</sub>
        </MathBlock>
      </Section>

      <Section heading="Success Probability and Expected Runtime">
        <p>
          A single run succeeds only if no logical error fires on any qubit-cycle and no T-injection
          fails. Using a logical error rate <em>p<sub>L</sub></em> (per qubit-cycle) and a T-injection
          error <em>p<sub>T</sub></em>:
        </p>
        <MathBlock>
          p<sub>S</sub> = (1 − p<sub>L</sub>)<sup>N · L<sub>corr</sub></sup> · (1 − p<sub>T</sub>)<sup>N<sub>T</sub></sup>
        </MathBlock>
        <p>
          Repetition under failure is captured by the expected runtime, surfaced in the main view as
           Runtime:
        </p>
        <MathBlock>
          t<sub>exp</sub> = t<sub>shot</sub> / p<sub>S</sub>
        </MathBlock>
        <p className="text-white/60">
          The estimator's runtime scales with <em>N<sub>T</sub></em> (a serial cost), not with T-depth.
          Circuits optimised for low T-depth therefore do not see the same speedup here as they do
          under surface codes.
        </p>
      </Section>
    </PageShell>
  );
}

function App() {
  const initial = useMemo(() => resolveCipherData(), []);
  const [ciphers, setCiphers] = useState(initial.data.ciphers);
  const [selectedCipherId, setSelectedCipherId] = useState(initial.data.ciphers[0]?.id || null);
  const [expandedCiphers, setExpandedCiphers] = useState(new Set([initial.data.ciphers[0]?.id]));
  const [view, setView] = useState(IS_EDIT ? 'input' : 'viz');
  const [expandedGroups, setExpandedGroups] = useState(new Set());
  const toggleGroup = (name) => {
    setExpandedGroups(prev => {
      const next = new Set(prev);
      if (next.has(name)) next.delete(name); else next.add(name);
      return next;
    });
  };
  // Navigating to a child item should ensure its parent group is expanded
  const navigateTo = (newView) => {
    setView(newView);
    if (['grover', 'shor'].includes(newView)) {
      setExpandedGroups(prev => new Set(prev).add('Quantum Algorithm'));
    } else if (['physical-surface', 'physical-qldpc'].includes(newView)) {
      setExpandedGroups(prev => new Set(prev).add('Physical Estimation'));
    }
  };
  // Click on the top banner → reset to a clean Resource Estimator screen
  // (no cipher picked, no menu group expanded). Display preferences are left
  // alone so the user doesn't lose their chart layout choices.
  const goHome = () => {
    setView('viz');
    setSelectedCipherId(null);
    setCustomCiphers(new Set());
    setExpandedCiphers(new Set());
    setExpandedGroups(new Set());
    setCipherFilter('selected');
  };
  const [theme, setTheme] = useState('light');

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  const [dataSource] = useState(initial.source);
  const [vizMetric, setVizMetric] = useState('qubits');
  const [vizScope, setVizScope] = useState('logical');
  const [physicalCode, setPhysicalCode] = useState('surface');   // 'qldpc' | 'surface'
  const [cycleTimeId, setCycleTimeId] = useState('1us');
  const [hwPresetId, setHwPresetId] = useState('p1e-3');
  const currentTc = (CYCLE_TIMES.find(c => c.id === cycleTimeId) || CYCLE_TIMES[0]).tc;
  const currentHw = HARDWARE_PRESETS.find(h => h.id === hwPresetId) || HARDWARE_PRESETS[0];
  const [logScale, setLogScale] = useState(true);
  const [chartShape, setChartShape] = useState('bar');
  const [cipherFilter, setCipherFilter] = useState('selected'); // 'selected' (chip-picked) | 'all'
  const [customCiphers, setCustomCiphers] = useState(new Set());
  const [scatterXMetric, setScatterXMetric] = useState('qubits');
  const [scatterYMetric, setScatterYMetric] = useState('tDepth');
  const [showAddCipher, setShowAddCipher] = useState(false);
  const [newCipherName, setNewCipherName] = useState('');

  const selectedCipher = ciphers.find(c => c.id === selectedCipherId);

  const updateVariant = (cipherId, variantId, newVar) => {
    setCiphers(cs => cs.map(c => c.id === cipherId
      ? { ...c, variants: c.variants.map(v => v.id === variantId ? newVar : v) }
      : c));
  };
  const deleteVariant = (cipherId, variantId) => {
    setCiphers(cs => cs.map(c => c.id === cipherId
      ? { ...c, variants: c.variants.filter(v => v.id !== variantId) }
      : c));
  };
  const addVariant = (cipherId) => {
    const c = ciphers.find(c => c.id === cipherId);
    const n = c.variants.length + 1;
    // ECC ciphers are all Shor-targeted. Only Prime ECC (Qubit opt / Depth opt)
    // carries a separate qldpcInputs override block for QLDPC physical-cost
    // calculation; Binary ECC reuses its `logical` values directly.
    const isEcc = ['ecc-qubit-opt', 'ecc-depth-opt', 'binary-ecc'].includes(cipherId);
    const hasQldpcOverride = ['ecc-qubit-opt', 'ecc-depth-opt'].includes(cipherId);
    const newVariant = {
      id: `v_${Math.random().toString(36).slice(2, 9)}`,
      name: `${c.name}-variant-${n}`,
      attack: isEcc ? 'Shor' : '',
      logical:  { qubits: "", clifford: "", tGates: "", tDepth: "", measurementGates: "" },
      physical: { physicalQubits: "", runtime: "" }, notes: ""
    };
    if (hasQldpcOverride) {
      newVariant.qldpcInputs = { qubits: "", tGates: "", measurementGates: "" };
    }
    setCiphers(cs => cs.map(c => c.id === cipherId
      ? { ...c, variants: [...c.variants, newVariant] } : c));
  };
  const addCipher = () => {
    const name = newCipherName.trim();
    if (!name) return;
    setCiphers(cs => [...cs, {
      id: `c_${Math.random().toString(36).slice(2, 9)}`,
      name, color: '#94a3b8',
      variants: [{
        id: `v_${Math.random().toString(36).slice(2, 9)}`,
        name: `${name}-1`, attack: "",
        logical:  { qubits: "", clifford: "", tGates: "", tDepth: "", measurementGates: "" },
        physical: { physicalQubits: "", runtime: "" }, notes: ""
      }]
    }]);
    setNewCipherName('');
    setShowAddCipher(false);
  };
  const deleteCipher = (id) => {
    if (!confirm('Delete this cipher and all its variants?')) return;
    setCiphers(cs => {
      const next = cs.filter(c => c.id !== id);
      if (id === selectedCipherId && next.length) setSelectedCipherId(next[0].id);
      return next;
    });
  };

  // ── Export functions ────────────────────────────────────────
  const downloadFile = (filename, content, mime = 'text/plain') => {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const exportJSON = () => {
    const json = JSON.stringify({ ciphers }, null, 2);
    const payload = `// Cipher data — generated ${new Date().toISOString().slice(0,10)}\nwindow.CIPHER_DATA = ${json};\n`;
    downloadFile('data.js', payload, 'text/javascript');
  };

  // ── Chart data ──────────────────────────────────────────────
  const chartData = useMemo(() => {
    const rows = [];
    const sourceCiphers = (
      cipherFilter === 'all' ? ciphers
      : ciphers.filter(c => customCiphers.has(c.id))
    );
    sourceCiphers.forEach(c => c.variants.forEach(v => {
      const src = vizScope === 'logical' ? v.logical : computePhysical(v, currentTc, currentHw, physicalCode);
      const fields = (vizScope === 'logical' ? LOGICAL_FIELDS : PHYSICAL_FIELDS).filter(f => !f.editOnly);
      const row = { name: v.name, cipher: c.name, color: c.color };
      fields.forEach(f => {
        const p = parseValue(src?.[f.key]);
        if (p !== null && p > 0) {
          // Plot raw values; Recharts <YAxis scale="log"> handles the log mapping
          // and emits human-readable ticks (10M, 100M, 1B, …) automatically.
          row[f.key] = p;
          row[`_raw_${f.key}`] = p;
        }
      });
      if (fields.some(f => row[f.key] !== undefined)) rows.push(row);
    }));
    return rows;
  }, [ciphers, vizScope, logScale, cipherFilter, selectedCipher, customCiphers, currentTc, currentHw, physicalCode]);


  const currentFields = (vizScope === 'logical' ? LOGICAL_FIELDS : PHYSICAL_FIELDS).filter(f => !f.editOnly);
  const currentMetric = currentFields.find(f => f.key === vizMetric) || currentFields[0];

  const scatterXField = currentFields.find(f => f.key === scatterXMetric) || currentFields[0];
  const scatterYField = currentFields.find(f => f.key === scatterYMetric) || currentFields[Math.min(1, currentFields.length - 1)];

  const scatterData = useMemo(() => {
    const rows = [];
    const sourceCiphers = (
      cipherFilter === 'all' ? ciphers
      : ciphers.filter(c => customCiphers.has(c.id))
    );
    if (!scatterXField || !scatterYField) return rows;
    sourceCiphers.forEach(c => c.variants.forEach(v => {
      const src = vizScope === 'logical' ? v.logical : computePhysical(v, currentTc, currentHw, physicalCode);
      const xRaw = parseValue(src?.[scatterXField.key]);
      const yRaw = parseValue(src?.[scatterYField.key]);
      if (xRaw > 0 && yRaw > 0) {
        // Plot raw values; Recharts axes use scale="log" for the log mapping.
        rows.push({
          name: v.name, cipher: c.name, color: c.color,
          x: xRaw,
          y: yRaw,
          _rawX: xRaw, _rawY: yRaw
        });
      }
    }));
    return rows;
  }, [ciphers, cipherFilter, selectedCipher, customCiphers, vizScope, scatterXField, scatterYField, currentTc, currentHw, physicalCode]);

  useEffect(() => {
    if (!currentFields.find(f => f.key === vizMetric)) setVizMetric(currentFields[0].key);
    // Reset scatter axes to sensible defaults for the new scope
    if (vizScope === 'logical') {
      setScatterXMetric('qubits');
      setScatterYMetric('tDepth');
    } else {
      setScatterXMetric('physicalQubits');
      setScatterYMetric('runtime');
    }
  }, [vizScope]); // eslint-disable-line

  // Keep the Detailed-estimates panel in sync with what's actually rendered on
  // the chart. If `selectedCipher` is not present among the chart rows (e.g. user
  // picked Shor-only ciphers but selectedCipher is still AES), switch to the
  // first cipher that IS plotted. This makes the legend buttons feel responsive
  // and prevents stale detail panels.
  useEffect(() => {
    if (IS_EDIT) return;
    const rows = chartShape === 'scatter' ? scatterData : chartData;
    if (rows.length === 0) return;
    // Set of cipher names currently rendered on the chart
    const chartCipherNames = new Set(rows.map(r => r.cipher));
    const sel = ciphers.find(c => c.id === selectedCipherId);
    if (sel && chartCipherNames.has(sel.name)) return;   // still valid
    // Fallback: pick the first cipher that has any chart data
    const fallback = ciphers.find(c => chartCipherNames.has(c.name));
    if (fallback) setSelectedCipherId(fallback.id);

                          ({customCiphers.size}/{ciphers.length})
                        </span>
                        <div className="flex-1" />
                        <button onClick={() => setCustomCiphers(new Set(ciphers.map(c => c.id)))}
                          className="text-[10px] font-mono uppercase tracking-[0.15em] text-white/40 hover:text-cyan-300 transition-colors">
                          all
                        </button>
                        <span className="text-white/20">·</span>
                        <button onClick={() => setCustomCiphers(new Set())}
                          className="text-[10px] font-mono uppercase tracking-[0.15em] text-white/40 hover:text-red-300 transition-colors">
                          none
                        </button>
                      </div>
                      <div className="space-y-3">
                        {orderedKeys.map(attackKey => {
                          const list = groups.get(attackKey);
                          const groupIds = list.map(c => c.id);
                          const allOn = groupIds.every(id => customCiphers.has(id));
                          const anyOn = groupIds.some(id => customCiphers.has(id));
                          return (
                            <div key={attackKey}>
                              <div className="flex items-center gap-2 mb-2">
                                <span className="font-mono text-[11px] uppercase tracking-[0.2em] text-white/80">
                                  {SHORT[attackKey] || attackKey}
                                </span>
                                <button onClick={() => setCustomCiphers(s => {
                                  const n = new Set(s);
                                  if (allOn) groupIds.forEach(id => n.delete(id));
                                  else groupIds.forEach(id => n.add(id));
                                  return n;
                                })}
                                  className="text-[10px] font-mono uppercase tracking-[0.15em] text-white/40 hover:text-cyan-300/80 transition-colors">
                                  {allOn ? '−' : '+'}{anyOn && !allOn ? ` (${groupIds.filter(id => customCiphers.has(id)).length}/${groupIds.length})` : ''}
                                </button>
                                <div className="flex-1 h-px bg-white/5" />
                              </div>
                              <div className="flex flex-wrap gap-1.5">
                                {list.map(c => {
                                  const on = customCiphers.has(c.id);
                                  return (
                                    <button
                                      key={c.id}
                                      onClick={() => setCustomCiphers(s => {
                                        const n = new Set(s);
                                        if (n.has(c.id)) n.delete(c.id); else n.add(c.id);
                                        return n;
                                      })}
                                      className="flex items-center gap-1.5 px-3 py-1.5 rounded text-[13px] font-mono border transition-all"
                                      style={{
                                        borderColor: on ? c.color : 'var(--chip-off-border)',
                                        background: on ? `${c.color}18` : 'transparent',
                                        color: on ? c.color : 'var(--chip-off-text)',
                                      }}>
                                      <div className="w-1.5 h-1.5 rounded-full" style={{ background: c.color }} />
                                      {c.name}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}

                <div className="rounded-lg border border-white/8 bg-white/[0.015] p-6">
                  {!hasChartData ? (
                    <div className="h-[500px] flex flex-col items-center justify-center text-center">
                      <Icon name="sparkles" size={32} className="text-white/20 mb-4" />
                      <p className="font-mono text-sm text-white/40 mb-1">No data available</p>
                      <p className="font-mono text-xs text-white/25">
                        {IS_EDIT ? 'Enter values in Data Entry to populate this chart.' : cipherFilter === 'selected' && customCiphers.size === 0 ? 'Pick one or more ciphers above to compare.' : vizScope === 'physical' && physicalCode === 'qldpc' ? 'QLDPC physical-cost estimation is applied only to Shor-targeted variants (Prime ECC, Binary ECC). Switch to Surface code to include Grover-targeted ciphers.' : vizScope === 'physical' ? 'Required logical resources (Logical Qubits, T Gates, Clifford Gates, T-depth) are missing for the selected variants.' : 'No resource estimates have been published for this view yet.'}
                      </p>
                    </div>
                  ) : (
                    <>
                      <div className="flex items-center justify-between mb-6">
                        <div className="font-mono text-xs text-white/50">
                          {chartShape === 'scatter' ? `${scatterData.length} variants plotted` : `${chartData.length} variants · ${vizScope} resources`}
                        </div>
                      </div>
                      <div style={{ width: '100%', height: 500 }}>
                        <ResponsiveContainer>
                          {chartShape === 'bar' ? (
                            <BarChart data={chartData} margin={{ top: 20, right: 20, bottom: cipherFilter === 'all' ? 130 : 70, left: 55 }}>
                              <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.06)" vertical={false} />
                              {cipherFilter === 'all' ? (
                                <XAxis dataKey="name" stroke="rgba(255,255,255,0.15)" interval={0}
                                  tickLine={false}
                                  tick={(props) => <CipherGroupTick {...props} chartData={chartData} ciphers={ciphers} />} />
                              ) : (
                                <XAxis dataKey="name" tick={{ fill: 'rgba(255,255,255,0.5)', fontSize: 11, fontFamily: 'JetBrains Mono' }}
                                  stroke="rgba(255,255,255,0.15)" angle={-45} textAnchor="end" height={70} interval={0} />
                              )}
                              <YAxis tick={{ fill: 'rgba(255,255,255,0.5)', fontSize: 11, fontFamily: 'JetBrains Mono' }}
                                stroke="rgba(255,255,255,0.15)"
                                width={80}
                                scale="log"
                                domain={[
                                  (dataMin) => dataMin > 0 ? dataMin / 4 : 0.001,
                                  'auto'
                                ]}
                                allowDataOverflow={false}
                                tickFormatter={(v) => currentMetric.key === 'runtime' ? formatRuntime(v) : formatAbbrev(v)}
                                label={{
                                  value: currentMetric.label,
                                  angle: -90, position: 'left', offset: 10,
                                  style: { fill: 'rgba(255,255,255,0.4)', fontSize: 10, fontFamily: 'JetBrains Mono' } }} />
                              <Tooltip cursor={{ fill: 'rgba(255,255,255,0.03)' }} content={<ChartTooltip logScale={false} />} />
                              <Bar dataKey={vizMetric} name={currentMetric.label} radius={[4, 4, 0, 0]}>
                                {chartData.map((d, i) => <Cell key={i} fill={d.color} />)}
                              </Bar>
                            </BarChart>
                          ) : (
                            <ScatterChart margin={{ top: 20, right: 30, bottom: 60, left: 55 }}>
                              <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.06)" />
                              <XAxis type="number" dataKey="x" name={scatterXField?.label}
                                scale="log" domain={['auto', 'auto']} allowDataOverflow={false}
                                tick={{ fill: 'rgba(255,255,255,0.5)', fontSize: 11, fontFamily: 'JetBrains Mono' }}
                                stroke="rgba(255,255,255,0.15)"
                                tickFormatter={(v) => scatterXField?.key === 'runtime' ? formatRuntime(v) : formatAbbrev(v)}
                                label={{ value: scatterXField?.label,
                                  position: 'insideBottom', offset: -10,
                                  style: { fill: 'rgba(255,255,255,0.4)', fontSize: 10, fontFamily: 'JetBrains Mono' } }} />
                              <YAxis type="number" dataKey="y" name={scatterYField?.label}
                                scale="log" domain={['auto', 'auto']} allowDataOverflow={false}
                                width={80}
                                tick={{ fill: 'rgba(255,255,255,0.5)', fontSize: 11, fontFamily: 'JetBrains Mono' }}
                                stroke="rgba(255,255,255,0.15)"
                                tickFormatter={(v) => scatterYField?.key === 'runtime' ? formatRuntime(v) : formatAbbrev(v)}
                                label={{ value: scatterYField?.label,
                                  angle: -90, position: 'left', offset: 10,
                                  style: { fill: 'rgba(255,255,255,0.4)', fontSize: 10, fontFamily: 'JetBrains Mono' } }} />
                              <Tooltip cursor={{ stroke: 'rgba(255,255,255,0.2)', strokeDasharray: '3 3' }}
                                content={({ active, payload }) => {
                                  if (!active || !payload?.length) return null;
                                  const d = payload[0].payload;
                                  return (
                                    <div className="rounded-lg border px-4 py-3 backdrop-blur-md shadow-2xl"
                                         style={{
                                           background:  'var(--tooltip-bg)',
                                           borderColor: 'var(--tooltip-border)',
                                           color:       'var(--tooltip-value)',
                                         }}>
                                      <div className="font-mono text-lg" style={{ color: d.color }}>{d.name}</div>
                                      <div className="font-mono text-xs mb-2" style={{ color: 'var(--tooltip-label)' }}>{d.cipher}</div>
                                      <div className="font-mono text-xs space-y-1" style={{ color: 'var(--tooltip-name)' }}>
                                        <div>{scatterXField?.label}: <span style={{ color: 'var(--tooltip-value)' }}>{scatterXField?.key === 'runtime' ? formatRuntime(d._rawX) : formatValue(d._rawX)}</span></div>
                                        <div>{scatterYField?.label}: <span style={{ color: 'var(--tooltip-value)' }}>{scatterYField?.key === 'runtime' ? formatRuntime(d._rawY) : formatValue(d._rawY)}</span></div>
                                      </div>
                                    </div>
                                  );
                                }} />
                              <Scatter data={scatterData}>
                                {scatterData.map((d, i) => <Cell key={i} fill={d.color} />)}
                              </Scatter>
                            </ScatterChart>
                          )}
                        </ResponsiveContainer>
                      </div>
                    </>
                  )}
                </div>

                {hasChartData && (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
                    {ciphers.map(c => {
                      const count = (chartShape === 'scatter' ? scatterData : chartData)
                        .filter(d => d.cipher === c.name).length;
                      if (count === 0) return null;
                      const isSelected = selectedCipherId === c.id;
                      return (
                        <button
                          key={c.id}
                          onClick={() => setSelectedCipherId(c.id)}
                          title={`Show ${c.name} detailed estimates`}
                          className="flex items-center gap-2 px-3 py-2 rounded-md border bg-white/[0.015] hover:bg-white/[0.04] transition-colors text-left"
                          style={{
                            borderColor: isSelected ? c.color : 'rgba(255,255,255,0.08)',
                            background: isSelected ? `${c.color}10` : undefined,
                          }}>
                          <div className="w-2 h-2 rounded-full" style={{ background: c.color }} />
                          <span className="font-mono text-xs text-white/80">{c.name}</span>
                          <span className="font-mono text-[10px] text-white/40 ml-auto">{count}</span>
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* Read-only data table when in view mode and a cipher is selected.
                    Position: AFTER the legend so users can pick from the legend → see details below. */}
                {!IS_EDIT && selectedCipher && (
                  <div className="space-y-4 pt-4">
                    <div className="flex items-center gap-3">
                      <div className="w-2 h-2 rounded-full" style={{ background: selectedCipher.color }} />
                      <h3 className="font-mono text-3xl text-white">{selectedCipher.name}</h3>
                      <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-white/40">Detailed estimates</span>
                    </div>
                    <div className="space-y-4">
                      {selectedCipher.variants.map(v => (
                        <VariantBlock key={v.id} variant={v} accent={selectedCipher.color}
                          onChange={() => {}} onDelete={() => {}} readOnly={true} />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ) : view === 'overview' ? (
              <OverviewPage />
            ) : view === 'grover' ? (
              <GroverPage ciphers={ciphers} />
            ) : view === 'shor' ? (
              <ShorPage ciphers={ciphers} />
            ) : view === 'physical-surface' ? (
              <SurfaceCodesPage />
            ) : view === 'physical-qldpc' ? (
              <QldpcCodesPage />
            ) : view === 'refs' ? (
              <ReferencesPage />
            ) : null}
          </main>
        </div>

        <footer className="border-t border-white/8 mt-12">
          <div className="max-w-[1600px] mx-auto px-8 py-4 flex items-center justify-between flex-wrap gap-2 text-[10px] font-mono uppercase tracking-[0.2em] text-white/30">
            <span>{SITE_CONFIG.affiliation} · {SITE_CONFIG.group} · {SITE_CONFIG.lastUpdated}</span>
            <span>Source: {dataSource} · Values accept 2^N · N·2^M · scientific</span>
          </div>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
